<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản Lý Điểm Danh</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4f8dfd,#1e3a8a);
    color:white;
    text-align:center;
    margin:0;
}
.container{
    margin-top:40px;
}
button{
    padding:8px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.add-btn{ background:#10b981; color:white; }
.delete-btn{ background:#ef4444; color:white; }
.admin-panel{ margin-top:20px; }
.month-box{
    background:rgba(255,255,255,0.1);
    padding:20px;
    margin:20px auto;
    width:400px;
    border-radius:12px;
}
input{
    width:90%;
    padding:6px;
    margin:4px 0;
    border-radius:6px;
    border:none;
}
a.button{
    display:block;
    margin:6px auto;
    padding:10px;
    background:white;
    color:#1e3a8a;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}
.hidden{ display:none; }
</style>
</head>
<body>

<div class="container">
<h1>📊 Hệ Thống Điểm Danh</h1>

<div id="loginBox">
<input type="password" id="adminPass" placeholder="Nhập mật khẩu quản trị">
<button onclick="login()">Đăng nhập</button>
</div>

<div id="adminPanel" class="hidden">
<button class="add-btn" onclick="addMonth()">➕ Thêm Tháng</button>
<div id="months"></div>
</div>

</div>

<script>
const PASSWORD = "123456"; // 🔐 ĐỔI MẬT KHẨU Ở ĐÂY

let data = JSON.parse(localStorage.getItem("attendanceData")) || [];

function saveData(){
    localStorage.setItem("attendanceData", JSON.stringify(data));
}

function login(){
    let pass = document.getElementById("adminPass").value;
    if(pass === PASSWORD){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminPanel").classList.remove("hidden");
        render();
    }else{
        alert("Sai mật khẩu!");
    }
}

function addMonth(){
    let name = prompt("Nhập tháng (vd: 04/2026)");
    if(!name) return;
    data.unshift({name:name, links:{}});
    saveData();
    render();
}

function deleteMonth(index){
    if(confirm("Xóa tháng này?")){
        data.splice(index,1);
        saveData();
        render();
    }
}

function updateLink(index,key,value){
    data[index].links[key] = value;
    saveData();
    render();
}

function render(){
    let container = document.getElementById("months");
    container.innerHTML="";
    data.forEach((month, index)=>{
        let div = document.createElement("div");
        div.className="month-box";
        div.innerHTML = `
        <h2>Tháng ${month.name}</h2>
        ${createInput(index,"k67","Khối 6 & 7")}
        ${createInput(index,"k8","Khối 8")}
        ${createInput(index,"k9","Khối 9")}
        ${createInput(index,"k10","Khối 10")}
        ${createInput(index,"k11","Khối 11")}
        ${createInput(index,"k12","Khối 12")}
        ${createInput(index,"clb","CLB")}
        <button class="delete-btn" onclick="deleteMonth(${index})">Xóa Tháng</button>
        `;
        container.appendChild(div);
    });
}

function createInput(index,key,label){
    let value = data[index].links[key] || "";
    return `
    <input placeholder="Link ${label}" value="${value}"
    onchange="updateLink(${index},'${key}',this.value)">
    <a class="button" href="${value}" target="_blank">${label}</a>
    `;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản Lý Điểm Danh</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4f8dfd,#1e3a8a);
    color:white;
    text-align:center;
    margin:0;
}
.container{ margin-top:40px; }

button{
    padding:6px 12px;
    margin:4px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:13px;
}

.add-btn{ background:#10b981; color:white; }
.delete-btn{ background:#ef4444; color:white; }
.copy-btn{ background:#6366f1; color:white; }
.update-btn{ background:#f59e0b; color:white; }

.month-box{
    background:rgba(255,255,255,0.1);
    padding:20px;
    margin:20px auto;
    width:500px;
    border-radius:12px;
}

.input-row{
    margin-bottom:10px;
}

input{
    width:70%;
    padding:6px;
    border-radius:6px;
    border:none;
}

.link-display{
    display:inline-block;
    margin-top:5px;
    font-size:13px;
    opacity:0.6;
    word-break:break-all;
}

.hidden{ display:none; }
</style>
</head>
<body>

<div class="container">
<h1>📊 Hệ Thống Điểm Danh</h1>

<div id="loginBox">
<input type="password" id="adminPass" placeholder="Nhập mật khẩu quản trị">
<button onclick="login()">Đăng nhập</button>
</div>

<div id="adminPanel" class="hidden">
<button class="add-btn" onclick="addMonth()">➕ Thêm Tháng</button>
<div id="months"></div>
</div>
</div>

<script>
const PASSWORD = "123456";

let data = JSON.parse(localStorage.getItem("attendanceData")) || [];

function saveData(){
    localStorage.setItem("attendanceData", JSON.stringify(data));
}

function login(){
    let pass = document.getElementById("adminPass").value;
    if(pass === PASSWORD){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminPanel").classList.remove("hidden");
        render();
    } else alert("Sai mật khẩu!");
}

function addMonth(){
    let name = prompt("Nhập tháng (vd: 04/2026)");
    if(!name) return;
    data.unshift({name:name, links:{}});
    saveData();
    render();
}

function deleteMonth(index){
    if(confirm("Xóa tháng này?")){
        data.splice(index,1);
        saveData();
        render();
    }
}

function updateLink(index,key,value){
    data[index].links[key] = value;
    saveData();
}

function copyLink(value){
    if(!value) return alert("Chưa có link");
    navigator.clipboard.writeText(value);
    alert("Đã copy!");
}

function render(){
    let container = document.getElementById("months");
    container.innerHTML="";
    data.forEach((month,index)=>{
        let div=document.createElement("div");
        div.className="month-box";
        div.innerHTML=`
        <h2>Tháng ${month.name}</h2>
        ${createRow(index,"k67","Khối 6 & 7")}
        ${createRow(index,"k8","Khối 8")}
        ${createRow(index,"k9","Khối 9")}
        ${createRow(index,"k10","Khối 10")}
        ${createRow(index,"k11","Khối 11")}
        ${createRow(index,"k12","Khối 12")}
        ${createRow(index,"clb","CLB")}
        <button class="delete-btn" onclick="deleteMonth(${index})">Xóa Tháng</button>
        `;
        container.appendChild(div);
    });
}

function createRow(index,key,label){
    let value = data[index].links[key] || "";
    return `
    <div class="input-row">
        <input value="${value}" 
        oninput="updateLink(${index},'${key}',this.value)">
        <button class="copy-btn" onclick="copyLink('${value}')">📋 Copy</button>
        <a class="update-btn" href="${value}" target="_blank">🔗 Mở</a>
        <div class="link-display">${value}</div>
    </div>
    `;
}
</script>

</body>
</html>
